<div id="loading" class="hidden text-center py-8">
    <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-green-600 border-t-transparent"></div>
    <p class="mt-2 text-green-800 font-medium">Scanning the skies...</p>
</div>

<div id="locationFallback" class="hidden max-w-md mx-auto mb-8 p-6 glass-card border-2 border-yellow-200 bg-yellow-50/50">
    <p class="text-sm text-yellow-800 font-bold mb-3 flex items-center gap-2">
        📍 GPS was blocked or unavailable.
    </p>
    <div class="flex gap-2">
        <input type="text" id="manualLocation" placeholder="Enter City or Zip Code" 
               class="flex-grow p-3 rounded-xl border border-gray-300 text-sm focus:ring-2 focus:ring-green-500 outline-none">
        <button onclick="updateByManualLocation()" 
                class="bg-green-600 text-white px-6 py-3 rounded-xl text-sm font-bold hover:bg-green-700 transition-colors shadow-md">
            Go
        </button>
    </div>
    <p class="text-[10px] text-gray-500 mt-2 italic text-center">e.g., "Austin, TX" or "90210"</p>
</div>
